project:
  type: website

  # Preview settings
  preview:
    port: 4444
    browser: true
    watch-inputs: true
    navigate: true

freeze: auto

website:
  title: "Section on Intergovernmental Administration and Management"
  image: "/files/siam-logo.jpg"
  favicon: "/files/favicon.ico"
  page-navigation: true
  #google-analytics:
  #  tracking-id:

  announcement: 
    icon: exclamation-triangle-fill
    dismissable: false
    content: "**Alert** - Work in progress. Not ready for production."
    type: warning
    position: below-navbar

  navbar:
    logo: "files/siam_logo.jpg"
    logo-alt: "SIAM Logo"
    logo-href: "/index.qmd"
    title: false
    align: bottom
    collapse-below: lg

    left:
      - text: "About"
        menu:
          - href: "about/index.qmd"
            text: "About SIAM"
          - href: "about/leadership.qmd"
            text: "Leadership"
          - href: "about/bylaws.qmd"
            text: "Bylaws"
      - href: "symposia/index.qmd"
        text: "Symposia"      
      - href: "awards.qmd"
        text: "Awards"
      - href: "slgr.qmd"
        text: "State & Local Government Review"
    tools:
      - icon: linkedin
        href: https://linkedin.com/company/aspasiam
        aria-label: SIAM LinkedIn

  page-footer: 
    border: false
    left: |
      <span class="faux-block">Stay up-to-date with SIAM</span>
      <a href="/join-us.qmd"  class="btn btn-primary btn-lg" target="_blank" rel="noopener noreferrer">&nbsp;&nbsp;&nbsp;subscribe to email&nbsp;&nbsp;&nbsp;</a>
    center: |
      <span class="faux-block"> [About SIAM](/about/index.qmd)</span>
      <span class="faux-block"> [Symposia](/symposia/index.qmd)</span>
      <span class="faux-block"> [Awards](/awards.qmd)</span>
      <span class="faux-block"> [SLGR](/slgr.qmd)</span>
    right: |
      <span class="faux-block">A section of [![](/files/logo-nowords-white.png){width=95px}](https://www.aspanet.org)</span>
        

format:
  html:
    theme: [flatly, html/siam.scss]
    mainfont: "Open Sans"
    toc: true
    grid:
      sidebar-width: 250px
      body-width: 900px
      margin-width: 300px
    